<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tempo blog — MPP demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">tempo blog</a>
    <span class="nav-meta">
      <span id="walletInfo" style="display: none; color: rgb(16, 185, 129); margin-right: 8px;"></span>
      mpp-enabled
    </span>
  </nav>

  <main>
    <article>
      <div class="post-header">
        <h1 id="title">Loading...</h1>
        <div class="post-meta">
          <span id="author"></span> · <span id="date"></span>
        </div>
      </div>

      <!-- Preview content (always shown) -->
      <div id="previewContent" class="post-content"></div>

      <!-- Paywall (shown until payment) -->
      <div id="paywall" class="paywall" style="display: none;">
        <div class="paywall-fade" id="paywallFade"></div>
        <div class="paywall-prompt">
          <h3>continue reading</h3>
          <p>this article is paid via the Machine Payment Protocol.</p>
          <div class="paywall-price" id="price">—</div>
          <button id="btnUnlock" class="btn" onclick="unlockArticle()">
            unlock full article →
          </button>
          <div id="status" class="status-msg"></div>
        </div>
      </div>

      <!-- Full content (shown after payment) -->
      <div id="fullContent" class="post-content full-content" style="display: none;"></div>

      <div id="receipt" style="display: none;">
        <span class="receipt-badge">✓ paid via MPP</span>
      </div>
    </article>
  </main>

  <script>
    const API = window.location.origin
    let walletAddress = null

    // Convert markdown-ish text to HTML
    function renderContent(text) {
      return text
        .split('\n\n')
        .map(para => {
          if (para.startsWith('## ')) {
            return `<h2>${para.slice(3)}</h2>`
          }
          para = para.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          para = para.replace(/`(.+?)`/g, '<code>$1</code>')
          if (para.startsWith('- ')) {
            const items = para.split('\n').map(l => `<li>${l.slice(2)}</li>`).join('')
            return `<ul>${items}</ul>`
          }
          return `<p>${para}</p>`
        })
        .join('\n')
    }

    function showFullContent(data, label = '✓ paid via MPP') {
      document.getElementById('paywall').style.display = 'none'
      document.getElementById('previewContent').style.display = 'none'
      document.getElementById('fullContent').innerHTML = renderContent(data.content)
      document.getElementById('fullContent').style.display = 'block'
      document.getElementById('receipt').style.display = 'block'
      document.querySelector('.receipt-badge').textContent = label
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status')
      el.textContent = msg
      el.className = `status-msg ${type}`
    }

    // Listen for wallet address from Tempo extension
    window.addEventListener('tempo:wallet', async (e) => {
      walletAddress = e.detail.address
      console.log('[Blog] Tempo wallet detected:', walletAddress)
      document.getElementById('walletInfo').textContent = `wallet: ${walletAddress.slice(0, 8)}...${walletAddress.slice(-6)}`
      document.getElementById('walletInfo').style.display = 'inline'

      // Check if this wallet already has access
      await checkExistingAccess()
    })

    // Also check if address was set before our listener (race condition)
    setTimeout(() => {
      if (!walletAddress && window.__TEMPO_WALLET_ADDRESS__) {
        walletAddress = window.__TEMPO_WALLET_ADDRESS__
        console.log('[Blog] Tempo wallet detected (delayed):', walletAddress)
        document.getElementById('walletInfo').textContent = `wallet: ${walletAddress.slice(0, 8)}...${walletAddress.slice(-6)}`
        document.getElementById('walletInfo').style.display = 'inline'
        checkExistingAccess()
      }
    }, 500)

    // Check if wallet already paid
    async function checkExistingAccess() {
      if (!walletAddress) return
      try {
        const res = await fetch(`${API}/api/access?address=${walletAddress}`)
        const data = await res.json()
        if (data.hasAccess) {
          console.log('[Blog] Wallet has existing access, loading full content...')
          // Fetch full content with wallet header (no payment needed)
          const fullRes = await fetch(`${API}/api/full`, {
            headers: { 'X-Wallet-Address': walletAddress }
          })
          if (fullRes.ok) {
            const fullData = await fullRes.json()
            showFullContent(fullData, '✓ already paid')
          }
        }
      } catch (err) {
        console.log('[Blog] Could not check access:', err)
      }
    }

    // Load preview, then check access before showing paywall
    async function loadPreview() {
      try {
        const res = await fetch(`${API}/api/preview`)
        const data = await res.json()

        document.getElementById('title').textContent = data.title
        document.getElementById('author').textContent = data.author
        document.getElementById('date').textContent = data.date
        document.getElementById('previewContent').innerHTML = renderContent(data.content)
        document.getElementById('price').textContent = `${data.price} ${data.currency}`

        // Wait briefly for wallet address from extension, then check access
        await new Promise(r => setTimeout(r, 600))

        // If wallet connected and already paid, skip the paywall entirely
        if (walletAddress) {
          const accessRes = await fetch(`${API}/api/access?address=${walletAddress}`)
          const accessData = await accessRes.json()
          if (accessData.hasAccess) {
            const fullRes = await fetch(`${API}/api/full`)
            if (fullRes.ok) {
              const fullData = await fullRes.json()
              showFullContent(fullData, '✓ already paid')
              return
            }
          }
        }

        // No existing access — show paywall
        document.getElementById('paywall').style.display = 'block'
      } catch (err) {
        document.getElementById('title').textContent = 'Error loading article'
      }
    }

    // Unlock via MPP payment
    async function unlockArticle() {
      const btn = document.getElementById('btnUnlock')
      btn.disabled = true
      setStatus('requesting full article...', 'loading')

      try {
        // This fetch returns 402 → extension intercepts → pays → retries → 200
        // (wallet address is auto-attached by the extension's fetch wrapper)
        const res = await fetch(`${API}/api/full`)

        if (res.status === 402) {
          setStatus('payment required — make sure Tempo extension is active with an access key', 'error')
          btn.disabled = false
          return
        }

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Unknown error' }))
          setStatus(err.error || `Error ${res.status}`, 'error')
          btn.disabled = false
          return
        }

        const data = await res.json()
        showFullContent(data)

      } catch (err) {
        setStatus(err.message || 'Failed to unlock', 'error')
        btn.disabled = false
      }
    }

    loadPreview()
  </script>
</body>
</html>
